services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-pc_builder}
      POSTGRES_USER: ${DB_USER:-pc_builder_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pc_builder_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # initdb.d only runs on a fresh volume (first start).
      # The backend's migrate.ts runner tracks applied migrations in _migrations
      # and is idempotent — safe to run on every start even if initdb.d already ran.
      - ./apps/backend/src/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${DB_NAME:-pc_builder}
      PGUSER: ${DB_USER:-pc_builder_user}
      PGPASSWORD: ${DB_PASSWORD:-pc_builder_pass_2024}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-production}
      SERVE_STATIC: "true"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    # Volumes removed: Frontend/Admin now built inside the container via multi-stage Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
