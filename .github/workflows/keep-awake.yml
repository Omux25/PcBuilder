name: Keep Deployed App Awake

on:
  schedule:
    # Run every 10 minutes (Render free tier goes to sleep after 15 minutes of inactivity)
    - cron: '*/10 * * * *'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health check
        run: |
          curl -s -f https://pcbuilder-m2nf.onrender.com/api/health
